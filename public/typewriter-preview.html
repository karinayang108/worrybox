<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: url('/bg.jpg') center/cover no-repeat;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  min-height: 100vh;
}

/* ══ MACHINE ══ */
.machine {
  width: 620px;
  position: relative;
  filter: drop-shadow(0 24px 60px rgba(0,0,0,0.65));
}

/* ══ PAPER SECTION ══ */
.paper-section {
  display: flex; justify-content: center;
  position: relative; z-index: 10;
}
.paper-wrap {
  position: relative; display: flex; flex-direction: column; align-items: center;
}
.paper-clips {
  display: flex; justify-content: space-between;
  width: 290px; height: 14px; margin-top: -2px;
}
.guide-clip {
  width: 22px; height: 14px;
  background: linear-gradient(to right, #787878, #d8d8d8 40%, #a8a8a8 60%, #646464);
  border-radius: 0 0 3px 3px;
  box-shadow: 1px 2px 4px rgba(0,0,0,0.4);
}
.paper {
  width: 290px; height: 170px;
  overflow: hidden;
  position: relative;
  box-shadow: 5px 0 14px rgba(0,0,0,0.2), -5px 0 14px rgba(0,0,0,0.2), inset 0 -16px 30px rgba(0,0,0,0.08);
}
.paper::before {
  content:''; position:absolute; top:0; bottom:0; width:1.5px;
}
.paper-text {
  position:absolute; bottom:10px; left:0; right:0;
  padding: 0 14px 0 44px;
  font-family: 'Courier New', monospace;
  font-size:13px; line-height:24px;
  white-space:pre-wrap; word-break:break-word; letter-spacing:0.04em;
}
.cursor {
  display:inline-block; width:1.5px; height:12px;
  margin-left:1px; vertical-align:middle;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }

/* ══ ROLLER HOUSING ══ */
.roller-housing {
  display: flex; align-items: center;
  padding: 6px 14px;
  gap: 10px; position: relative; z-index: 5;
}
.spool {
  width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
  position: relative;
}
.spool::before {
  content:''; position:absolute; inset:7px; border-radius:50%;
  box-shadow: inset 0 3px 7px rgba(0,0,0,0.55), inset 0 -2px 3px rgba(255,255,255,0.1);
  border: 2.5px solid rgba(0,0,0,0.2);
}
.spool::after {
  content:''; position:absolute; inset:20px; border-radius:50%;
  background: radial-gradient(circle at 35% 30%, #d0d0d0, #808080 50%, #404040);
  border: 2px solid #303030;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.6), inset 0 -1px 2px rgba(255,255,255,0.15);
}
.platen-wrap { flex: 1; position: relative; }
.platen {
  height: 28px; border-radius: 14px;
  background: linear-gradient(to bottom,
    #606060 0%, #383838 12%, #141414 45%, #222222 65%, #424242 85%, #585858 100%);
  border: 2.5px solid #080808;
  box-shadow:
    0 5px 0 #040404, 0 7px 14px rgba(0,0,0,0.75),
    inset 0 2px 4px rgba(255,255,255,0.07), inset 0 -1px 3px rgba(0,0,0,0.6);
  overflow: hidden; position: relative;
}
.platen::before {
  content:''; position:absolute; top:4px; left:8%; right:8%; height:4px;
  background: rgba(255,255,255,0.07); border-radius:2px;
}
.platen::after {
  content:''; position:absolute; inset:0;
  background: repeating-linear-gradient(90deg, transparent, transparent 11px, rgba(0,0,0,0.09) 11px, rgba(0,0,0,0.09) 12px);
}

/* ══ ARCH PANEL ══ */
.arch-wrap {
  position: relative; height: 80px; overflow: hidden; margin-top: -1px;
}
.arch-wrap svg { width: 100%; height: 100%; display: block; }

/* ══ MAIN BODY ══ */
.body {
  border-top: none;
  border-radius: 0 0 28px 28px;
  padding: 14px 28px 26px;
  position: relative;
}
.body::before {
  content:''; position:absolute;
  left:0; top:0; bottom:0; width:12px;
  border-radius: 0 0 0 28px;
}
.body::after {
  content:''; position:absolute;
  right:0; top:0; bottom:0; width:12px;
  border-radius: 0 0 28px 0;
}
.trim-top { height:2px; margin-bottom:12px; }
.trim-bot { height:1.5px; margin-top:14px; opacity:0.7; }
.kb-well {
  border-radius: 10px;
  padding: 14px 12px 16px;
  border: 2px solid rgba(0,0,0,0.3);
}
.keyboard { display:flex; flex-direction:column; gap:7px; align-items:center; }
.key-row { display:flex; gap:6px; }

/* ══ KEYS ══ */
.key {
  width: 37px; height: 37px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: Georgia, serif; font-size: 11px; font-weight: 700;
  cursor: default; position: relative;
  border: 2px solid rgba(0,0,0,0.5);
  transition: transform 0.07s ease, box-shadow 0.07s ease;
}
.key::before {
  content:''; position:absolute; inset:5px; border-radius:50%;
  box-shadow: inset 0 3px 7px rgba(0,0,0,0.45), inset 0 -1px 3px rgba(255,255,255,0.15);
  border: 1px solid rgba(0,0,0,0.3);
}
.key span { position:relative; z-index:2; }
.key.pressed {
  transform: translateY(5px) scale(0.90);
}
.space-row { display:flex; justify-content:center; gap:8px; margin-top:2px; }
.fn-key {
  width:38px; height:26px; border-radius:13px;
  border: 2px solid rgba(0,0,0,0.4);
  box-shadow: 0 4px 0 rgba(0,0,0,0.4), 0 6px 10px rgba(0,0,0,0.55), inset 0 2px 3px rgba(255,255,255,0.2);
  transition: transform 0.07s ease, box-shadow 0.07s ease; position:relative;
}
.fn-key::before {
  content:''; position:absolute; inset:4px 6px;
  border-radius:9px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.4);
}
.fn-key.pressed { transform:translateY(4px); box-shadow:0 0 0 rgba(0,0,0,0.4), inset 0 2px 5px rgba(0,0,0,0.4); }
.spacebar {
  width: 215px; height: 26px; border-radius:13px;
  border: 2px solid rgba(0,0,0,0.4);
  box-shadow: 0 4px 0 rgba(0,0,0,0.4), 0 6px 10px rgba(0,0,0,0.55), inset 0 2px 3px rgba(255,255,255,0.2);
  transition: transform 0.07s ease, box-shadow 0.07s ease; position:relative;
}
.spacebar::before {
  content:''; position:absolute; inset:4px 12px;
  border-radius:9px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.4);
}
.spacebar.pressed { transform:translateY(4px); box-shadow:0 0 0 rgba(0,0,0,0.4), inset 0 2px 5px rgba(0,0,0,0.4); }
.feet { display:flex; justify-content:space-between; padding:0 60px; }
.foot {
  width:58px; height:18px;
  border-radius:0 0 10px 10px; border-top:none;
  box-shadow:0 5px 10px rgba(0,0,0,0.5);
}

/* ══ THEME SWITCHER ══ */
.theme-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0 14px;
}
.hint {
  color:rgba(255,255,255,0.8); font-family:sans-serif;
  font-size:13px; letter-spacing:0.05em;
  text-shadow:0 1px 4px rgba(0,0,0,0.7);
}
.theme-btn {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2.5px solid rgba(255,255,255,0.3);
  cursor: pointer; transition: border-color 0.2s, transform 0.15s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.5);
}
.theme-btn:hover { transform: scale(1.15); }
.theme-btn.active { border-color: rgba(255,255,255,0.95); transform: scale(1.1); }
#btn-blue  { background: radial-gradient(circle at 35% 30%, #a8d8f0, #3a7aaa 50%, #1a4a70); }
#btn-brass { background: radial-gradient(circle at 35% 30%, #f0c870, #b87333 50%, #6b3d1a); }
#btn-noir  { background: radial-gradient(circle at 35% 30%, #888, #222 50%, #000); }

/* ══ TRANSITION ══ */
.machine, .machine * { transition: background 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease, color 0.35s ease; }
.machine .key, .machine .fn-key, .machine .spacebar { transition: background 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease, transform 0.07s ease; }

/* ══════════════════════════════════════════
   THEME: MIDNIGHT NOIR (Art Deco)
══════════════════════════════════════════ */
.machine[data-theme="noir"] .paper {
  background:

    linear-gradient(to bottom right, #fafaf8, #f0eee8);
}
.machine[data-theme="noir"] .paper::before { background: rgba(180,150,40,0.35); }
.machine[data-theme="noir"] .paper-text { color: #080808; }
.machine[data-theme="noir"] .cursor { background: #080808; }

.machine[data-theme="noir"] .roller-housing {
  background: linear-gradient(to bottom, #2a2a2a 0%, #141414 50%, #2a2a2a 100%);
  border-top: 3px solid #d4aa48;
  border-bottom: 2px solid #888040;
  box-shadow: inset 0 2px 6px rgba(220,180,60,0.1), inset 0 -3px 8px rgba(0,0,0,0.6);
}
.machine[data-theme="noir"] .spool {
  background: radial-gradient(circle at 32% 26%, #585858 0%, #303030 20%, #181818 45%, #0a0a0a 70%, #040404 100%);
  border: 3px solid #d4aa48;
  box-shadow: 4px 5px 0 #020202, 5px 7px 14px rgba(0,0,0,0.8), inset 0 3px 8px rgba(220,180,60,0.2), inset 0 -3px 6px rgba(0,0,0,0.6);
}
.machine[data-theme="noir"] .spool::before {
  background: radial-gradient(circle at 35% 28%, #484848, #181818 60%, #080808);
  border-color: #d4aa48;
}
.machine[data-theme="noir"] .spool::after {
  background: radial-gradient(circle at 35% 30%, #f0f0f0, #a0a0a0 50%, #404040);
}

.machine[data-theme="noir"] .body {
  background: linear-gradient(160deg, #282828 0% 4%, #181818 6%, #0e0e0e 40%, #080808 80%, #101010 100%);
  border: 3px solid #d4aa48;
  box-shadow: 0 18px 0 #020202, 0 22px 40px rgba(0,0,0,0.85), inset 3px 0 10px rgba(0,0,0,0.5), inset -3px 0 10px rgba(0,0,0,0.5), inset 0 2px 8px rgba(220,180,60,0.08), inset 0 -6px 18px rgba(0,0,0,0.6);
}
.machine[data-theme="noir"] .body::before { background: linear-gradient(to right, #020202, transparent); }
.machine[data-theme="noir"] .body::after  { background: linear-gradient(to left,  #020202, transparent); }
.machine[data-theme="noir"] .trim-top { background: linear-gradient(90deg, transparent, #d4aa48 10%, #d4aa48 90%, transparent); }
.machine[data-theme="noir"] .trim-bot { background: linear-gradient(90deg, transparent, #887830 10%, #887830 90%, transparent); }
.machine[data-theme="noir"] .kb-well {
  background: linear-gradient(to bottom, #040404, #080808);
  box-shadow: inset 0 5px 15px rgba(0,0,0,0.85), inset 0 -2px 6px rgba(0,0,0,0.6), inset 4px 0 10px rgba(0,0,0,0.5), inset -4px 0 10px rgba(0,0,0,0.5);
  border-color: #020202;
}
.machine[data-theme="noir"] .key {
  background: radial-gradient(circle at 42% 22%, #686868 0%, #383838 25%, #181818 55%, #0a0a0a 80%, #040404 100%);
  border-color: #d4aa48; color: #d4aa48;

/* ══ THEME SWITCHER ══ */
const machine = document.getElementById('machine');
const archSvg = document.getElementById('arch-svg');
let currentTheme = 'brass';

function setTheme(theme) {
  currentTheme = theme;
  machine.dataset.theme = (theme === 'default') ? '' : theme;
  archSvg.innerHTML = ARCHES[theme] || ARCHES.brass;
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + theme);
  if (btn) btn.classList.add('active');
}

/* ══ KEYBOARD ══ */
const ROWS = [
  { keys:['1','2','3','4','5','6','7','8','9','0','-','='], stagger:0  },
  { keys:['Q','W','E','R','T','Y','U','I','O','P','[',']'], stagger:14 },
  { keys:['A','S','D','F','G','H','J','K','L',';','"'],     stagger:22 },
  { keys:['Z','X','C','V','B','N','M',',','.','?'],         stagger:32 },
]
const kb=document.getElementById('keyboard'), keyEls={}
ROWS.forEach(({keys,stagger})=>{
  const row=document.createElement('div'); row.className='key-row'
  row.style.paddingLeft=stagger+'px'
  keys.forEach(k=>{
    const el=document.createElement('div'); el.className='key'
    el.innerHTML=`<span>${k}</span>`; row.appendChild(el); keyEls[k]=el
  }); kb.appendChild(row)
})
const spRow=document.createElement('div'); spRow.className='space-row'
const sk1=document.createElement('div'); sk1.className='fn-key'; keyEls['CTRL']=sk1
const sp=document.createElement('div');  sp.className='spacebar';  keyEls['SPACE']=sp
const sk2=document.createElement('div'); sk2.className='fn-key'; keyEls['ALT']=sk2
spRow.append(sk1,sp,sk2); kb.appendChild(spRow)

let audioCtx=null
const ROW_MAP={'1':3,'2':3,'3':3,'4':3,'5':3,'6':3,'7':3,'8':3,'9':3,'0':3,'-':3,'=':3,'q':2,'w':2,'e':2,'r':2,'t':2,'y':2,'u':2,'i':2,'o':2,'p':2,'[':2,']':2,'a':1,'s':1,'d':1,'f':1,'g':1,'h':1,'j':1,'k':1,'l':1,';':1,'"':1,'enter':1,'z':0,'x':0,'c':0,'v':0,'b':0,'n':0,'m':0,',':0,'.':0,'?':0,'backspace':0,' ':0}
const HPF=[300,650,1000,1400],DECAY=[0.07,0.055,0.045,0.035]
function playClick(key){
  if(!audioCtx) audioCtx=new AudioContext()
  const row=ROW_MAP[key.toLowerCase()]??1
  const sz=Math.floor(audioCtx.sampleRate*0.05)
  const buf=audioCtx.createBuffer(1,sz,audioCtx.sampleRate)
  const d=buf.getChannelData(0);const dec=DECAY[row]
  for(let i=0;i<sz;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(sz*(dec/0.05)))
  const src=audioCtx.createBufferSource();src.buffer=buf
  const hpf=audioCtx.createBiquadFilter();hpf.type='highpass';hpf.frequency.value=HPF[row]
  const g=audioCtx.createGain()
  g.gain.setValueAtTime(row===0?.5:.35,audioCtx.currentTime)
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dec)
  src.connect(hpf);hpf.connect(g);g.connect(audioCtx.destination);src.start()
}
function updatePaper(val){document.getElementById('txt').textContent=val}
const timers={}
function pressKey(dk){const el=keyEls[dk];if(!el)return
  el.classList.add('pressed');clearTimeout(timers[dk])
  timers[dk]=setTimeout(()=>el.classList.remove('pressed'),150)}
function codeToKey(code){
  const l=code?.match(/^Key([A-Z])$/);if(l)return l[1]
  const n=code?.match(/^Digit(\d)$/);if(n)return n[1]
  const m={Space:'SPACE',Minus:'-',Equal:'=',BracketLeft:'[',BracketRight:']',Semicolon:';',Quote:'"',Comma:',',Period:'.',Slash:'?'}
  return m[code]??null
}
const hidden=document.getElementById('hidden')
document.body.addEventListener('click',()=>hidden.focus()); hidden.focus()
hidden.addEventListener('keydown',e=>{
  const key=e.key
  if(key.length===1||key==='Enter'||key==='Backspace') playClick(key)
  const dk=codeToKey(e.code)||(key===' '?'SPACE':key.length===1?key.toUpperCase():null)
  if(dk) pressKey(dk)
})
hidden.addEventListener('input',()=>updatePaper(hidden.value))
// init default theme visuals
archSvg.innerHTML = ARCHES.brass;
document.getElementById('btn-brass').classList.add('active');
updatePaper('')
</script>
</body>
</html>
